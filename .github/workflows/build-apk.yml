name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.21.0'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Create google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          else
            printf '%s\n' '{"project_info":{"project_number":"000000000000","project_id":"dummy-project-for-ci","storage_bucket":"dummy-project-for-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.pocketpalai"}},"api_key":[{"current_key":"dummy-api-key-for-ci-builds"}]}]}' > android/app/google-services.json
          fi

      - name: Create .env file
        run: |
          printf 'FIREBASE_FUNCTIONS_URL=%s\nSUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nPALSHUB_API_BASE_URL=%s\nAPP_URL=aisodchat://app\nENABLE_PALSHUB_INTEGRATION=true\nENABLE_AUTHENTICATION=true\nENABLE_OFFLINE_MODE=true\nGOOGLE_IOS_CLIENT_ID=%s\nGOOGLE_WEB_CLIENT_ID=%s\n' \
            "${{ vars.FIREBASE_FUNCTIONS_URL }}" \
            "${{ vars.SUPABASE_URL }}" \
            "${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ vars.PALSHUB_API_BASE_URL }}" \
            "${{ vars.GOOGLE_IOS_CLIENT_ID }}" \
            "${{ vars.GOOGLE_WEB_CLIENT_ID }}" > .env

      - name: Set up Android Keystore
        working-directory: android/app
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > pocketpal-release-key.keystore
            echo "KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            keytool -genkeypair -v \
              -storetype PKCS12 \
              -keystore pocketpal-release-key.keystore \
              -alias pocketpal_key_alias \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass dummy-ci-password \
              -keypass dummy-ci-password \
              -dname "CN=AisodChat Build, OU=CI, O=AisodChat, L=CI, S=CI, C=US"
            echo "KEYSTORE_PASSWORD=dummy-ci-password" >> $GITHUB_ENV
            echo "KEY_PASSWORD=dummy-ci-password" >> $GITHUB_ENV
          fi

      - name: Build APK
        working-directory: android
        env:
          APP_RELEASE_STORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          APP_RELEASE_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AisodChat-${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
